<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>手術管理系統 - 謝醫師專用版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .box { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .leave-box { background: #fff5f5; border-left: 5px solid #ff4d4f; }
        .ai-box { background: #e6f7ff; border-left: 5px solid #1890ff; }
        .filter-box { background: #f8f9fa; border: 1px solid #dee2e6; }
        textarea { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 15px 0; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-save { background: #27ae60; color: white; width: 100%; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8f9fa; padding: 12px; border-bottom: 2px solid #dee2e6; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .loading { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.7); justify-content:center; align-items:center; z-index:999; font-weight:bold; }
    </style>
</head>
<body>

<div id="loader" class="loading">⚙️ 正在同步雲端資料...</div>

<div class="container">
    <div class="box leave-box">
        <strong>🚩 醫師請假登記 (格式：謝 5/6 0900-1400)</strong>
        <textarea id="leaveInput" rows="1" placeholder="輸入：名字 日期 時間"></textarea>
        <button class="btn" style="background:#ff4d4f; color:white; width:100%; margin-top:8px" onclick="parseLeave()">登記請假</button>
        <div id="leaveList" style="margin-top:10px; font-size:12px; color:#cf1322;"></div>
    </div>

    <div class="box ai-box">
        <strong>🤖 AI 快速帶入排程</strong>
        <textarea id="aiInput" rows="1" placeholder="OPU 05/30 0900-0930 姓名 病歷 主刀 主治 備註"></textarea>
        <button class="btn" style="background:#1890ff; color:white; width:100%; margin-top:8px" onclick="aiParse()">解析至表單</button>
    </div>

    <form id="scheduleForm">
        <input type="hidden" id="editId">
        <div class="form-grid">
            <div><label>日期</label><input type="date" id="date" required></div>
            <div><label>開始時間</label><input type="time" id="startTime" required></div>
            <div><label>結束時間</label><input type="time" id="endTime" required></div>
        </div>
        <div class="form-grid">
            <div><label>病人姓名</label><input type="text" id="patientName" required></div>
            <div><label>病歷號</label><input type="text" id="patientId" required></div>
            <div><label>手術名稱</label><input type="text" id="surgeryName" required></div>
        </div>
        <div class="form-grid">
            <div><label>主刀醫師</label><input type="text" id="leadSurgeon" required></div>
            <div><label>主治醫師</label><input type="text" id="attendingDoc" required></div>
            <div><label>備註</label><input type="text" id="notes"></div>
        </div>
        <button type="submit" id="saveBtn" class="btn btn-save">💾 儲存手術排程</button>
        <button type="button" id="cancelBtn" class="btn" style="display:none; background:#bfbfbf; margin-top:5px; width:100%" onclick="resetForm()">取消修改</button>
    </form>

    <div class="box filter-box" style="margin-top:40px;">
        <div class="form-grid">
            <div><label>📅 開始日期篩選</label><input type="date" id="startDate" onchange="renderTable()"></div>
            <div><label>📅 結束日期篩選</label><input type="date" id="endDate" onchange="renderTable()"></div>
            <div style="grid-column: span 2;"><label>🔍 全域搜尋</label><input type="text" id="searchBox" placeholder="搜尋姓名、手術、備註..." oninput="renderTable()"></div>
        </div>
    </div>

    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr>
                    <th>日期</th><th>時間</th><th>病人資訊</th><th>手術名稱</th><th>主刀/主治</th><th>備註</th><th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz4NHDuzSF6mmaFwm7eTsHwKd7H-5dQgU41mWhNYjEVDHhIFC8yF2VfXPBQHsI6IwCMUA/exec"; 
    let allSchedules = [];
    let allLeaves = [];

    async function fetchData() {
        toggleLoader(true);
        try {
            const res = await fetch(WEB_APP_URL);
            const data = await res.json();
            allSchedules = data.schedules;
            allLeaves = data.leaves;
            renderTable();
            renderLeaves();
        } catch(e) { console.error(e); }
        toggleLoader(false);
    }

    // --- 核心邏輯：衝突檢查 (包含請假與排程重疊) ---
    function checkConflict(date, start, end, lead, currentId) {
        const toMin = (t) => { 
            const parts = t.split(':').map(Number);
            return parts[0] * 60 + (parts[1] || 0); 
        };
        const sMin = toMin(start), eMin = toMin(end);
        if (sMin >= eMin) return "❌ 錯誤：開始時間必須早於結束時間";

        const cleanN = (n) => n.replace(/醫師/g, "").trim();
        const leadN = cleanN(lead);

        // 1. 檢查主刀醫師請假
        for (let l of allLeaves) {
            if (l.date === date) {
                const leaveN = cleanN(l.name);
                const isMatch = (t, lN) => t.includes(lN) || lN.includes(t) || (t[0] === lN[0] && t.length > 0);
                if (isMatch(leadN, leaveN)) {
                    if (sMin < toMin(l.end) && eMin > toMin(l.start)) {
                        return `❌ 衝突：主刀 ${l.name} 此時段請假 (${l.start}-${l.end})`;
                    }
                }
            }
        }

        // 2. 檢查排程重疊 (核心修正)
        for (let s of allSchedules) {
            // 跳過正在編輯的那一筆
            if (s.id === currentId) continue;

            if (s.date === date) {
                const existingStart = toMin(s.startTime);
                const existingEnd = toMin(s.endTime);
                
                // 重疊邏輯：(新開始 < 舊結束) 且 (新結束 > 舊開始)
                if (sMin < existingEnd && eMin > existingStart) {
                    return `⚠️ 時段重疊：此時段已有病人 ${s.patientName} 的手術 (${s.startTime}-${s.endTime})`;
                }
            }
        }
        return null;
    }

    function renderTable() {
        const search = document.getElementById('searchBox').value.toLowerCase();
        const sDate = document.getElementById('startDate').value;
        const eDate = document.getElementById('endDate').value;

        let filtered = allSchedules.filter(item => {
            const content = (item.patientName + item.patientId + item.surgeryName + item.leadSurgeon + item.attendingDoc + (item.notes||"")).toLowerCase();
            const dateInRange = (sDate ? item.date >= sDate : true) && (eDate ? item.date <= eDate : true);
            return content.includes(search) && dateInRange;
        });

        filtered.sort((a, b) => {
            if (a.date !== b.date) return a.date.localeCompare(b.date);
            return a.startTime.localeCompare(b.startTime);
        });

        document.getElementById('tableBody').innerHTML = filtered.map(item => `
            <tr>
                <td>${item.date}</td>
                <td><b>${item.startTime}</b> - ${item.endTime}</td>
                <td>${item.patientName}<br><small>${item.patientId}</small></td>
                <td>${item.surgeryName}</td>
                <td>${item.leadSurgeon} / ${item.attendingDoc}</td>
                <td style="font-size:12px">${item.notes||''}</td>
                <td>
                    <button onclick="startEdit('${item.id}')">改</button>
                    <button onclick="deleteItem('${item.id}')">刪</button>
                </td>
            </tr>
        `).join('');
    }

    async function parseLeave() {
        const text = document.getElementById('leaveInput').value.trim();
        const nameMatch = text.match(/^(\S+)/); 
        const dateMatch = text.match(/(\d{1,2})[\/\-](\d{1,2})/); 
        const timeMatch = text.match(/(\d{2})(\d{2})\s*[\-~]\s*(\d{2})(\d{2})/); 
        
        if(!nameMatch || !dateMatch || !timeMatch) return alert("格式範例：謝 5/6 0900-1400");
        
        toggleLoader(true);
        const leaveObj = {
            action: 'addLeave', id: Date.now().toString(), name: nameMatch[1],
            date: `${new Date().getFullYear()}-${dateMatch[1].padStart(2,'0')}-${dateMatch[2].padStart(2,'0')}`,
            start: `${timeMatch[1]}:${timeMatch[2]}`, end: `${timeMatch[3]}:${timeMatch[4]}`
        };
        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(leaveObj) });
        document.getElementById('leaveInput').value = '';
        fetchData();
    }

    document.getElementById('scheduleForm').onsubmit = async function(e) {
        e.preventDefault();
        const editId = document.getElementById('editId').value;
        const conflict = checkConflict(
            document.getElementById('date').value, 
            document.getElementById('startTime').value, 
            document.getElementById('endTime').value, 
            document.getElementById('leadSurgeon').value,
            editId
        );
        
        if(conflict) return alert(conflict);

        toggleLoader(true);
        const payload = {
            action: editId ? 'update' : 'add', id: editId || Date.now().toString(),
            date: document.getElementById('date').value, startTime: document.getElementById('startTime').value, endTime: document.getElementById('endTime').value,
            patientName: document.getElementById('patientName').value, patientId: document.getElementById('patientId').value, surgeryName: document.getElementById('surgeryName').value,
            leadSurgeon: document.getElementById('leadSurgeon').value, attendingDoc: document.getElementById('attendingDoc').value, notes: document.getElementById('notes').value
        };
        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
        resetForm(); fetchData();
    };

    function startEdit(id) {
        const item = allSchedules.find(i => i.id === id);
        Object.keys(item).forEach(k => { if(document.getElementById(k)) document.getElementById(k).value = item[k]; });
        document.getElementById('editId').value = item.id;
        document.getElementById('saveBtn').innerText = "🔄 更新排程";
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo(0,0);
    }

    async function deleteItem(id) { if(confirm("確定刪除？")) { toggleLoader(true); await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: id }) }); fetchData(); } }
    async function deleteLeave(id) { if(confirm("取消請假紀錄？")) { toggleLoader(true); await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteLeave', id: id }) }); fetchData(); } }
    function renderLeaves() { document.getElementById('leaveList').innerHTML = allLeaves.map(l => `${l.name} ${l.date} ${l.start}-${l.end} <span onclick="deleteLeave('${l.id}')" style="cursor:pointer">❌</span>`).join(' | '); }
    function resetForm() { document.getElementById('scheduleForm').reset(); document.getElementById('editId').value = ""; document.getElementById('saveBtn').innerText = "💾 儲存手術排程"; document.getElementById('cancelBtn').style.display = "none"; }
    function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    function aiParse() {
        const text = document.getElementById('aiInput').value.trim();
        const words = text.split(/\s+/);
        const dMatch = text.match(/(\d{1,2})[\/\-](\d{1,2})/);
        if(dMatch) document.getElementById('date').value = `${new Date().getFullYear()}-${dMatch[1].padStart(2,'0')}-${dMatch[2].padStart(2,'0')}`;
        const tMatch = text.match(/(\d{2})(\d{2})\s*[\-~]\s*(\d{2})(\d{2})/);
        if(tMatch) { document.getElementById('startTime').value = `${tMatch[1]}:${tMatch[2]}`; document.getElementById('endTime').value = `${tMatch[3]}:${tMatch[4]}`; }
        if (words.length >= 7) {
            document.getElementById('surgeryName').value = words[0];
            document.getElementById('patientName').value = words[words.length-5];
            document.getElementById('patientId').value = words[words.length-4];
            document.getElementById('leadSurgeon').value = words[words.length-3];
            document.getElementById('attendingDoc').value = words[words.length-2];
            document.getElementById('notes').value = words[words.length-1];
        }
    }
    window.onload = fetchData;
</script>
</body>
</html>
