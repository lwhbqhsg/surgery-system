<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>手術管理系統 - 謝醫師專用版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .box { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .leave-box { background: #fff5f5; border-left: 5px solid #ff4d4f; }
        .ai-box { background: #e6f7ff; border-left: 5px solid #1890ff; }
        .standby-row td { background-color: #fffbe6 !important; } 
        .standby-tag { background: #faad14; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-right: 8px; display: inline-block; font-weight: bold; }
        .date-divider { background-color: #f1f3f4 !important; font-weight: bold; color: #444; }
        .date-divider td { padding: 8px 15px !important; border-bottom: 2px solid #ddd; font-size: 15px; }
        textarea { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin: 15px 0; align-items: center; }
        .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; }
        input[type="text"], input[type="date"], select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .checkbox-container { display: flex; align-items: center; font-weight: bold; color: #d48806; cursor: pointer; background: #fffbe6; padding: 5px 10px; border-radius: 5px; border: 1px solid #faad14; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-save { background: #27ae60; color: white; width: 100%; font-size: 16px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8f9fa; padding: 12px; border-bottom: 2px solid #dee2e6; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:nth-child(even):not(.date-divider):not(.standby-row) { background-color: #fafafa; }
        .loading { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.7); justify-content:center; align-items:center; z-index:999; font-weight:bold; font-size: 20px; }
        .label-small { font-size: 12px; color: #666; margin-bottom: 2px; display: block; }
    </style>
</head>
<body>

<div id="loader" class="loading">⚙️ 同步中...</div>

<div class="container">
    <div style="display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px;">
        <div class="box leave-box">
            <strong>🚩 醫師請假登記 (支援多日區間)</strong>
            <div style="margin-top: 10px;">
                <label class="label-small">選擇醫師</label>
                <input type="text" id="leaveDocName" list="docOptions" placeholder="選擇醫師" onfocus="this.value=''">
            </div>
            <div class="mini-grid">
                <div><label class="label-small">開始日期</label><input type="date" id="leaveStartDate"></div>
                <div><label class="label-small">結束日期</label><input type="date" id="leaveEndDate"></div>
            </div>
            <div class="mini-grid">
                <div><label class="label-small">開始時間</label><select id="leaveStart" class="time-select" onfocus="this.selectedIndex=0"></select></div>
                <div><label class="label-small">結束時間</label><select id="leaveEnd" class="time-select" onfocus="this.selectedIndex=0"></select></div>
            </div>
            <button class="btn" style="background:#ff4d4f; color:white; width:100%; margin-top:8px" onclick="submitLeaveRange()">登記區間請假</button>
            <div id="leaveList" style="margin-top:10px; font-size:12px; color:#cf1322; border-top:1px solid #ffccc7; padding-top:5px; max-height: 150px; overflow-y: auto;"></div>
        </div>

        <div class="box ai-box">
            <strong>🤖 AI 快速帶入</strong>
            <textarea id="aiInput" rows="4" placeholder="格式範例：5/6 0830-0900 王大同 A1234567 取卵 謝昀樵 李俊逸 備註"></textarea>
            <button class="btn" style="background:#1890ff; color:white; width:100%; margin-top:8px" onclick="aiParse()">解析至表單</button>
        </div>
    </div>

    <form id="scheduleForm" class="box">
        <input type="hidden" id="editId">
        <div class="form-grid">
            <div><label>日期</label><input type="date" id="date" required></div>
            <div>
                <label>開始時間 (24H)</label>
                <select id="startTime" class="time-select" required onchange="autoCalcEndTime()" onfocus="this.selectedIndex=0"></select>
            </div>
            <div>
                <label>結束時間 (可調整)</label>
                <select id="endTime" class="time-select" required onfocus="this.selectedIndex=0"></select>
            </div>
            <div class="checkbox-container">
                <input type="checkbox" id="isStandby" style="width:20px; height:20px; margin-right:8px;"> 
                <label for="isStandby">設為本日候補</label>
            </div>
        </div>
        <div class="form-grid">
            <div><label>病人姓名</label><input type="text" id="patientName" required></div>
            <div><label>病歷號</label><input type="text" id="patientId" required></div>
            <div>
                <label>手術名稱</label>
                <input type="text" id="surgeryName" list="surgeryOptions" required onchange="autoCalcEndTime()" onfocus="this.value=''">
            </div>
        </div>
        <div class="form-grid">
            <div><label>主刀醫師</label><input type="text" id="leadSurgeon" list="docOptions" required onfocus="this.value=''"></div>
            <div><label>主治醫師</label><input type="text" id="attendingDoc" list="docOptions" required onfocus="this.value=''"></div>
            <div><label>備註</label><input type="text" id="notes"></div>
        </div>
        <button type="submit" id="saveBtn" class="btn btn-save">💾 儲存手術排程</button>
        <button type="button" id="cancelBtn" class="btn" style="display:none; background:#bfbfbf; margin-top:5px; width:100%" onclick="resetForm()">取消修改</button>
    </form>

    <datalist id="docOptions">
        <option value="趙光漢"><option value="吳明義"><option value="謝昀樵"><option value="馮敏">
        <option value="李茂盛"><option value="李俊逸"><option value="林秉瑤"><option value="李毅評">
        <option value="周佳謙"><option value="鄭功祥">
    </datalist>
    <datalist id="surgeryOptions">
        <option value="取卵"><option value="TCR"><option value="速潔刀"><option value="卵巢PRP">
        <option value="TCR-PRP"><option value="取精"><option value="HSC"><option value="HSG">
        <option value="HSC+HSG"><option value="IUI"><option value="ET"><option value="IUI-PRP">
    </datalist>

    <div class="box" style="background:#f8f9fa;">
        <div class="form-grid">
            <div><label>📅 開始日期</label><input type="date" id="startDate" onchange="renderTable()"></div>
            <div><label>📅 結束日期</label><input type="date" id="endDate" onchange="renderTable()"></div>
            <div style="grid-column: span 2;"><label>🔍 搜尋</label><input type="text" id="searchBox" placeholder="搜尋姓名、醫師、手術..." oninput="renderTable()"></div>
        </div>
    </div>

    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr><th>日期</th><th>時間 (24H)</th><th>病人資訊</th><th>手術名稱</th><th>主刀/主治</th><th>備註</th><th>操作</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz4NHDuzSF6mmaFwm7eTsHwKd7H-5dQgU41mWhNYjEVDHhIFC8yF2VfXPBQHsI6IwCMUA/exec"; 
    let allSchedules = [];
    let allLeaves = [];

    const surgeryDurations = {
        "取卵": 30, "TCR": 60, "速潔刀": 60, "卵巢PRP": 60, "TCR-PRP": 60,
        "取精": 120, "HSC": 20, "HSG": 20, "HSC+HSG": 20, "IUI": 20,
        "ET": 20, "IUI-PRP": 20
    };

    const isTrue = (val) => val && val.toString().toLowerCase() === 'true';

    function initTimeSelects() {
        const selects = document.querySelectorAll('.time-select');
        let options = '<option value="">請選擇</option>';
        for (let h = 8; h <= 18; h++) {
            for (let m = 0; m < 60; m += 10) {
                if (h === 8 && m < 30) continue;
                if (h === 18 && m > 30) break;
                const hh = h.toString().padStart(2, '0');
                const mm = m.toString().padStart(2, '0');
                options += `<option value="${hh}:${mm}">${hh}:${mm}</option>`;
            }
        }
        selects.forEach(s => s.innerHTML = options);
    }

    function autoCalcEndTime() {
        const startVal = document.getElementById('startTime').value;
        const surgName = document.getElementById('surgeryName').value;
        const duration = surgeryDurations[surgName];
        if (startVal && duration) {
            const [h, m] = startVal.split(':').map(Number);
            const date = new Date();
            date.setHours(h, m + duration, 0);
            const endH = date.getHours().toString().padStart(2, '0');
            const endM = date.getMinutes().toString().padStart(2, '0');
            const resultTime = `${endH}:${endM}`;
            const endSelect = document.getElementById('endTime');
            endSelect.value = resultTime;
            if (endSelect.selectedIndex === -1) {
                const newOpt = new Option(resultTime, resultTime);
                endSelect.add(newOpt);
                endSelect.value = resultTime;
            }
        }
    }

    async function fetchData() {
        toggleLoader(true);
        try {
            const res = await fetch(WEB_APP_URL);
            const data = await res.json();
            allSchedules = data.schedules;
            allLeaves = data.leaves;
            renderTable();
            renderLeaves();
        } catch(e) { console.error(e); }
        toggleLoader(false);
    }

    function renderTable() {
        const search = document.getElementById('searchBox').value.toLowerCase();
        const sDate = document.getElementById('startDate').value, eDate = document.getElementById('endDate').value;
        let filtered = allSchedules.filter(item => {
            const content = (item.patientName + item.patientId + item.surgeryName + item.leadSurgeon + item.attendingDoc + (item.notes||"") + (isTrue(item.isStandby)?'候補':'')).toLowerCase();
            return content.includes(search) && (sDate ? item.date >= sDate : true) && (eDate ? item.date <= eDate : true);
        });
        filtered.sort((a, b) => (a.date + a.startTime).localeCompare(b.date + b.startTime));
        let html = "", lastDate = "";
        filtered.forEach(item => {
            if (item.date !== lastDate) { lastDate = item.date; html += `<tr class="date-divider"><td colspan="7">📅 ${item.date}</td></tr>`; }
            html += `
                <tr class="${isTrue(item.isStandby) ? 'standby-row' : ''}">
                    <td style="color:#888; font-size:11px;">${item.date}</td>
                    <td><b>${item.startTime}</b> - ${item.endTime}</td>
                    <td>${isTrue(item.isStandby) ? '<span class="standby-tag">候補</span>' : ''}<b>${item.patientName}</b><br><small>${item.patientId}</small></td>
                    <td>${item.surgeryName}</td>
                    <td>${item.leadSurgeon} / ${item.attendingDoc}</td>
                    <td style="font-size:12px">${item.notes||''}</td>
                    <td><button onclick="startEdit('${item.id}')">改</button> <button onclick="deleteItem('${item.id}')">刪</button></td>
                </tr>
            `;
        });
        document.getElementById('tableBody').innerHTML = html;
    }

    // 新功能：處理區間請假
    async function submitLeaveRange() {
        const name = document.getElementById('leaveDocName').value;
        const sDateStr = document.getElementById('leaveStartDate').value;
        const eDateStr = document.getElementById('leaveEndDate').value || sDateStr; // 若未填結束日期，預設同天
        const startT = document.getElementById('leaveStart').value;
        const endT = document.getElementById('leaveEnd').value;

        if(!name || !sDateStr || !startT || !endT) return alert("請填寫姓名、日期及時間");
        if(sDateStr > eDateStr) return alert("結束日期不可早於開始日期");
        if(sDateStr === eDateStr && startT >= endT) return alert("當天結束時間須晚於開始時間");

        toggleLoader(true);

        let current = new Date(sDateStr);
        const end = new Date(eDateStr);

        // 循環每一天進行登記
        while (current <= end) {
            const dateStr = current.toISOString().split('T')[0];
            
            // 判斷當天的請假起訖
            let dailyStart = (dateStr === sDateStr) ? startT : "08:30";
            let dailyEnd = (dateStr === eDateStr) ? endT : "18:30";

            await fetch(WEB_APP_URL, { 
                method: 'POST', 
                body: JSON.stringify({ 
                    action: 'addLeave', 
                    id: Date.now().toString() + Math.random(), 
                    name, 
                    date: dateStr, 
                    start: dailyStart, 
                    end: dailyEnd 
                })
            });

            current.setDate(current.getDate() + 1);
        }

        alert("區間請假登記完成！");
        fetchData();
    }

    function renderLeaves() {
        allLeaves.sort((a,b) => (a.date + a.start).localeCompare(b.date + b.start));
        document.getElementById('leaveList').innerHTML = "<strong>目前請假：</strong>" + allLeaves.map(l => 
            `<div style="margin:4px 0; background:#fff; padding:4px; border-radius:3px; border:1px solid #ffccc7;">
                ${l.name}：${l.date.split('-').slice(1).join('/')} (${l.start}-${l.end}) 
                <b onclick="deleteLeave('${l.id}')" style="cursor:pointer; color:red; float:right">×</b>
            </div>`).join('');
    }

    function aiParse() {
        const text = document.getElementById('aiInput').value.trim();
        const words = text.split(/\s+/);
        if (words.length < 2) return alert("資料不足");
        const dM = words[0].match(/(\d{1,2})[\/\-](\d{1,2})/);
        if(dM) document.getElementById('date').value = `${new Date().getFullYear()}-${dM[1].padStart(2,'0')}-${dM[2].padStart(2,'0')}`;
        const tM = words[1].match(/(\d{2})(\d{2})\s*[\-~]\s*(\d{2})(\d{2})/);
        if(tM) { 
            document.getElementById('startTime').value = `${tM[1]}:${tM[2]}`; 
            document.getElementById('endTime').value = `${tM[3]}:${tM[4]}`; 
        }
        if (words.length >= 3) document.getElementById('patientName').value = words[2];
        if (words.length >= 4) document.getElementById('patientId').value = words[3];
        if (words.length >= 5) { document.getElementById('surgeryName').value = words[4]; autoCalcEndTime(); }
        if (words.length >= 6) document.getElementById('leadSurgeon').value = words[5];
        if (words.length >= 7) document.getElementById('attendingDoc').value = words[6];
        if (words.length >= 8) document.getElementById('notes').value = words.slice(7).join(' ');
    }

    function checkConflict(date, start, end, lead, currentId, isStandby) {
        const toMin = (t) => { const p = t.split(':').map(Number); return p[0] * 60 + (p[1] || 0); };
        const sMin = toMin(start), eMin = toMin(end);
        if (sMin >= eMin) return "❌ 錯誤：開始時間必須早於結束時間";
        const cleanN = (n) => n.replace(/醫師/g, "").trim();
        const leadN = cleanN(lead);
        for (let l of allLeaves) {
            if (l.date === date) {
                const leaveN = cleanN(l.name);
                if (leadN === leaveN && sMin < toMin(l.end) && eMin > toMin(l.start)) return `❌ 衝突：${l.name} 醫師此時段請假中`;
            }
        }
        if (isStandby) {
            const existing = allSchedules.find(s => s.date === date && isTrue(s.isStandby) && s.id !== currentId);
            if (existing) return `⚠️ 每日限額：${date} 已有候補病人 ${existing.patientName}`;
            return null;
        }
        for (let s of allSchedules) {
            if (s.id === currentId || isTrue(s.isStandby)) continue;
            if (s.date === date) {
                const exS = toMin(s.startTime), exE = toMin(s.endTime);
                if (sMin < exE && eMin > exS) return `⚠️ 時段重疊：已有正式手術 ${s.patientName}`;
            }
        }
        return null;
    }

    document.getElementById('scheduleForm').onsubmit = async function(e) {
        e.preventDefault();
        const editId = document.getElementById('editId').value, isStandby = document.getElementById('isStandby').checked;
        const conflict = checkConflict(document.getElementById('date').value, document.getElementById('startTime').value, document.getElementById('endTime').value, document.getElementById('leadSurgeon').value, editId, isStandby);
        if(conflict) return alert(conflict);
        toggleLoader(true);
        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({
            action: editId ? 'update' : 'add', id: editId || Date.now().toString(),
            date: document.getElementById('date').value, startTime: document.getElementById('startTime').value, endTime: document.getElementById('endTime').value,
            patientName: document.getElementById('patientName').value, patientId: document.getElementById('patientId').value, surgeryName: document.getElementById('surgeryName').value,
            leadSurgeon: document.getElementById('leadSurgeon').value, attendingDoc: document.getElementById('attendingDoc').value, notes: document.getElementById('notes').value,
            isStandby: isStandby.toString()
        })});
        resetForm(); fetchData();
    };

    function startEdit(id) {
        const item = allSchedules.find(i => i.id === id);
        Object.keys(item).forEach(k => { 
            const el = document.getElementById(k);
            if(el) { if(k === 'isStandby') el.checked = isTrue(item[k]); else el.value = item[k]; }
        });
        document.getElementById('editId').value = item.id;
        document.getElementById('saveBtn').innerText = "🔄 更新排程";
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo(0, 0);
    }

    async function deleteItem(id) { if(confirm("確定刪除手術？")) { toggleLoader(true); await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: id }) }); fetchData(); } }
    async function deleteLeave(id) { if(confirm("取消此項請假？")) { toggleLoader(true); await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteLeave', id: id }) }); fetchData(); } }
    function resetForm() { document.getElementById('scheduleForm').reset(); document.getElementById('editId').value = ""; document.getElementById('isStandby').checked = false; document.getElementById('saveBtn').innerText = "💾 儲存手術排程"; document.getElementById('cancelBtn').style.display = "none"; }
    function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    
    window.onload = () => { initTimeSelects(); fetchData(); };
</script>
</body>
</html>
